name: Telegram Notify
on:
  push:
    branches: [main]
  issues:
    types: [opened]
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Push notify
        if: github.event_name == 'push'
        env:
          AUTHOR: ${{ github.event.head_commit.author.name }}
          MSG: ${{ github.event.head_commit.message }}
          BOT_TOKEN: 8752731720:AAHtL3nXN05lzeEu92qn4-UDD6QdX9aAzj8
          CHAT_ID: 7169756842
        run: |
          SHORT="${MSG:0:120}"
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=🤖 FlagOn 커밋

${AUTHOR}
${SHORT}"
      - name: Issue notify
        if: github.event_name == 'issues'
        env:
          NUM: ${{ github.event.issue.number }}
          TITLE: ${{ github.event.issue.title }}
          BOT_TOKEN: 8752731720:AAHtL3nXN05lzeEu92qn4-UDD6QdX9aAzj8
          CHAT_ID: 7169756842
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            --data-urlencode "text=📋 FlagOn 이슈 #${NUM}

${TITLE}"
